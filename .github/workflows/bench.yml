name: bench
on:
  workflow_call:
  workflow_dispatch:

jobs:
  bench:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: swr.cn-north-4.myhuaweicloud.com/sanbei/dhi.io/postgres:18
        env:
          POSTGRES_USER: myuser
          POSTGRES_PASSWORD: mypassword
          POSTGRES_DB: database
        ports:
          - 5433:5432

      redis:
        image: swr.cn-north-4.myhuaweicloud.com/sanbei/dhi.io/redis:8
        ports:
          - 4999:6379
        command: redis-server --requirepass 123456 --save "" --appendonly no

      chat:
        image: swr.cn-north-4.myhuaweicloud.com/sanbei/chat:latest
        ports:
          - "8800:8800"
          - "8801:8801"
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - uses: grafana/setup-k6-action@v1

      - name: Install monitor dependencies
        run: sudo apt-get update -y && sudo apt install -y redis-tools postgresql-client

      - name: Check chat logs
        run: sudo docker logs chat

      - name: Run monitor and k6 together
        run: |
          chmod +x monitor.sh

          # 等待 chat 服务真正接受请求
          echo "等待 chat 服务就绪..."
          for i in {1..60}; do
            if curl -sf http://localhost:8801/api/v1/users/batch -o /dev/null 2>&1; then
              echo "chat 服务已就绪 (耗时 ${i}s)"
              break
            fi
            if [ $i -eq 60 ]; then
              echo "chat 服务启动超时"
              exit 1
            fi
            sleep 1
          done

          ./monitor.sh &> >(tee monitor.log) &
          MONITOR_PID=$!

          k6 run k6.js &> >(tee k6.log)
          K6_EXIT=$?

          kill -9 "$MONITOR_PID" || true

          echo "### 📊 压测监控摘要" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### 📋 完整监控日志" >> $GITHUB_STEP_SUMMARY
          echo '```log' >> $GITHUB_STEP_SUMMARY
          cat monitor.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### 🚀 k6 压测最后 100 行" >> $GITHUB_STEP_SUMMARY
          echo '```log' >> $GITHUB_STEP_SUMMARY
          tail -n 100 k6.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          exit "$K6_EXIT"