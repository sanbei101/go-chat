name: build

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:    
  docker-build:
    runs-on: ubuntu-latest

    steps:
    - name: Login to HUAWEI Container Registry
      uses: docker/login-action@v4
      with:
        registry: swr.cn-north-4.myhuaweicloud.com
        username: ${{ secrets.HUAWEI_SWR_USERNAME }}
        password: ${{ secrets.HUAWEI_SWR_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build and push
      uses: docker/build-push-action@v7
      with:
        push: true
        tags: |
          swr.cn-north-4.myhuaweicloud.com/sanbei/chat:${{ github.sha }}
          swr.cn-north-4.myhuaweicloud.com/sanbei/chat:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        provenance: false

  bench:
    needs: docker-build
    uses: ./.github/workflows/bench-yml.yml