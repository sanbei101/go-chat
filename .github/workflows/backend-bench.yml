name: backend-bench

on:
  push:
    paths:
      - ".github/workflows/backend-bench.yml"
      - "backend/**"
  pull_request:
    paths:
      - ".github/workflows/backend-bench.yml"
      - "backend/**"
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: chat
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d chat"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Run benchmark
        env:
          POSTGRES_URL: postgresql://postgres:postgres@127.0.0.1:5432/chat?sslmode=disable
        run: go test -run '^$' -bench BenchmarkHubBroadcast -benchmem -benchtime=10s ./internal/ws
