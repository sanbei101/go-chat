name: 单元测试
on:
  workflow_dispatch:
  push:
    branches:
      - dev
jobs:
  bench-gateway:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: boot redis
        run: docker compose -f docker-compose.yaml up -d redis

      - name: Tune Linux Kernel & Open Files Limit
        run: |
          echo "=== 当前系统默认限制 ==="
          ulimit -a
          
          echo "=== 开始注入内核调优参数 ==="

          sudo sysctl -w fs.file-max=2000000
          
          sudo sysctl -w net.ipv4.ip_local_port_range="1024 65535"
          
          sudo sysctl -w net.core.somaxconn=65535
          sudo sysctl -w net.ipv4.tcp_rmem="4096 87380 16777216"
          sudo sysctl -w net.ipv4.tcp_wmem="4096 65536 16777216"
          sudo sysctl -w net.ipv4.tcp_tw_reuse=1
          
          sudo prlimit --pid $$ --nofile=1000000:1000000

      - name: Run benchmark tests
        run: |
          go build -o bench cmd/bench/main.go
          ./bench > bench.log 2>&1
          echo "### 📊 压测监控摘要" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -n 100 bench.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          
      - name: Upload pprof results
        uses: actions/upload-artifact@v7
        with:
          name: pprof-results
          path: |
            cpu.prof
            mem.prof