name: 单元测试
on:
  workflow_dispatch:
  push:
    branches:
      - dev
jobs:
  bench-gateway:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: boot redis
        run: docker compose -f docker-compose.yaml up -d redis

      - name: Run benchmark tests
        run: |
          go build -o bench cmd/bench/main.go
          ./bench > bench.log 2>&1
          echo "### 📊 压测监控摘要" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -n 100 bench.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY