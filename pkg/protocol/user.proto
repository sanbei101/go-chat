syntax = "proto3";

package proto;

option go_package = "./;proto";

message User {
  string user_id = 1;
  string nickname = 2;
  string avatar = 3;
}

message GetUserReq {
  string user_id = 1;
}

message GetUserResp {
  User user = 1;
}

message BatchGetUsersReq {
  repeated string user_ids = 1;
}

message BatchGetUsersResp {
  map<string, User> users = 1;
}
