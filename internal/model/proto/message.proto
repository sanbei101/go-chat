syntax = "proto3";

package im.proto.v1;

option go_package = "./pb";

enum MessageType {
  MESSAGE_TYPE_UNSPECIFIED = 0;
  MESSAGE_TYPE_TEXT = 1;
  MESSAGE_TYPE_IMAGE = 2;
  MESSAGE_TYPE_VIDEO = 3;
  MESSAGE_TYPE_FILE = 4;
  MESSAGE_TYPE_SYSTEM = 5;
}

message Message {
  bytes msg_id = 1;
  bytes client_msg_id = 2;
  bytes sender_id = 3;
  bytes room_id = 4;
  optional bytes reply_to_msg_id = 5;
  MessageType msg_type = 6;
  int64 server_time = 7;
  bytes payload = 8;
  optional bytes ext = 9;
}