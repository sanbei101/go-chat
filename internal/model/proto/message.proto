syntax = "proto3";

package chat.v1;

import "google/protobuf/timestamp.proto";

option go_package = "./model";

enum ChatType {
  CHAT_TYPE_UNSPECIFIED = 0;
  CHAT_TYPE_SINGLE = 1;
  CHAT_TYPE_GROUP = 2;
}

enum MessageType {
  MESSAGE_TYPE_UNSPECIFIED = 0;
  MESSAGE_TYPE_TEXT = 1;
  MESSAGE_TYPE_IMAGE = 2;
  MESSAGE_TYPE_VIDEO = 3;
  MESSAGE_TYPE_FILE = 4;
  MESSAGE_TYPE_SYSTEM = 5;
}

message Message {
  bytes msg_id = 1;
  bytes client_msg_id = 2;
  bytes sender_id = 3;
  bytes room_id = 4;
  
  ChatType chat_type = 5;
  int64 server_time = 6;
  
  optional bytes reply_to_msg_id = 7;
  
  MessageType msg_type = 8;
  
  bytes payload = 9;
  optional bytes ext = 10;
  
  google.protobuf.Timestamp created_at = 11;
}